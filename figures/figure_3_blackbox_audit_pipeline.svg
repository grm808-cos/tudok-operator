<svg xmlns="http://www.w3.org/2000/svg" width="1050" height="760" viewBox="0 0 1050 760" role="img" aria-labelledby="title desc">
  <title id="title">TUDOK black-box audit pipeline</title>
  <desc id="desc">A flow diagram showing fixed prompts, AI systems, frozen outputs, TUDOK evaluator, structured report, and audit dashboard.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L6,3 z" fill="#333333" />
    </marker>
    <style>
      .box { fill:#f7f7f7; stroke:#333333; stroke-width:2; rx:14; }
      .core { fill:#eef5ff; stroke:#1f4e79; stroke-width:2.5; rx:14; }
      .text { font-family:Arial, sans-serif; font-size:22px; fill:#111111; text-anchor:middle; }
      .small { font-family:Arial, sans-serif; font-size:18px; fill:#222222; text-anchor:middle; }
      .line { stroke:#333333; stroke-width:2.5; marker-end:url(#arrow); }
    </style>
  </defs>
  <text x="525" y="45" class="text" font-weight="700">Figure 3. TUDOK Black-Box Audit Pipeline</text>
  <rect x="310" y="75" width="430" height="62" class="box" />
  <text x="525" y="113" class="text">Fixed prompt set / test tasks</text>
  <line x1="525" y1="137" x2="525" y2="180" class="line" />
  <rect x="330" y="180" width="390" height="62" class="box" />
  <text x="525" y="218" class="text">AI system or multiple models</text>
  <line x1="525" y1="242" x2="525" y2="286" class="line" />
  <rect x="345" y="286" width="360" height="62" class="box" />
  <text x="525" y="324" class="text">Frozen outputs</text>
  <line x1="525" y1="348" x2="525" y2="392" class="line" />
  <rect x="225" y="392" width="600" height="150" class="core" />
  <text x="525" y="425" class="text" font-weight="700">TUDOK evaluator</text>
  <text x="525" y="463" class="small">segmentation · C/K/I/D scoring · normalization</text>
  <text x="525" y="491" class="small">diagnostic flags · uncertainty note</text>
  <line x1="525" y1="542" x2="525" y2="586" class="line" />
  <rect x="275" y="586" width="500" height="88" class="box" />
  <text x="525" y="617" class="text">Structured report</text>
  <text x="525" y="646" class="small">tudok_0_1 · tudok_percent · recommended_action</text>
  <line x1="525" y1="674" x2="525" y2="715" class="line" />
  <rect x="180" y="715" width="690" height="38" class="core" />
  <text x="525" y="741" class="small">Audit dashboard · time series · model comparison · review routing</text>
</svg>
