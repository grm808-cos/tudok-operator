<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="740" viewBox="0 0 1000 740" role="img" aria-labelledby="title desc">
  <title id="title">TUDOK as a truth-priority pre-processing gate</title>
  <desc id="desc">A flow diagram showing input, truth-priority pre-processing gate, gate decision, AI processing, output, and TUDOK output-level calibration.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L6,3 z" fill="#333333" />
    </marker>
    <style>
      .box { fill:#f7f7f7; stroke:#333333; stroke-width:2; rx:14; }
      .gate { fill:#eef5ff; stroke:#1f4e79; stroke-width:2.5; rx:14; }
      .text { font-family:Arial, sans-serif; font-size:22px; fill:#111111; text-anchor:middle; }
      .small { font-family:Arial, sans-serif; font-size:18px; fill:#222222; text-anchor:middle; }
      .line { stroke:#333333; stroke-width:2.5; marker-end:url(#arrow); }
    </style>
  </defs>
  <text x="500" y="45" class="text" font-weight="700">Figure 2. TUDOK as a Truth-Priority Pre-Processing Gate</text>
  <rect x="270" y="75" width="460" height="62" class="box" />
  <text x="500" y="113" class="text">User input / document / question</text>
  <line x1="500" y1="137" x2="500" y2="178" class="line" />
  <rect x="190" y="178" width="620" height="170" class="gate" />
  <text x="500" y="213" class="text" font-weight="700">Truth-priority pre-processing gate</text>
  <text x="500" y="250" class="small">claim detection · source status · certainty level</text>
  <text x="500" y="278" class="small">domain risk · normative sensitivity</text>
  <text x="500" y="316" class="small">status input before generation</text>
  <line x1="500" y1="348" x2="500" y2="390" class="line" />
  <rect x="225" y="390" width="550" height="76" class="box" />
  <text x="500" y="420" class="text">Gate decision</text>
  <text x="500" y="448" class="small">continue · clarify · request source · human review</text>
  <line x1="500" y1="466" x2="500" y2="510" class="line" />
  <rect x="330" y="510" width="340" height="62" class="box" />
  <text x="500" y="548" class="text">AI processing</text>
  <line x1="500" y1="572" x2="500" y2="613" class="line" />
  <rect x="360" y="613" width="280" height="55" class="box" />
  <text x="500" y="648" class="text">Output</text>
  <line x1="640" y1="640" x2="805" y2="640" class="line" />
  <rect x="805" y="608" width="170" height="64" class="gate" />
  <text x="890" y="634" class="small">TUDOK</text>
  <text x="890" y="657" class="small">output check</text>
</svg>
